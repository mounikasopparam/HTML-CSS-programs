<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            height: 400px;
            margin: 150px;
            border:2px solid black ;
            display: flex;
           
            
        }
        #Box1{
            
            height: 120px;
            width: 120px;
            border: 2px solid black;
            background-color: deeppink;
            top: 50px;
            position:static;
         }
         #Box2{
            height: 120px;
            width: 120px;
            border: 2px solid black;
            background-color:lightseagreen;
            top: 40px;
            left: 10px;
            position: relative;
         }
         #Box3{
            height: 120px;
            width: 120px;
            border: 2px solid black;
            background-color:gray;
            position: fixed;
            bottom: 10px;
            right: 10px;

         }
         #Box4{
            height: 120px;
            width: 120px;
            border: 2px solid black;
            background-color:cornflowerblue;
            position: absolute;
            top: 10px;
            left: 10px;

         }   
    </style>
</head>
<body>
    <div id="parent">
       <div id="Box1"></div>
       <div id="Box2"></div>
       <div id="Box3"></div>
       <div id="Box4"></div>
    </div>
</body>
</html>
